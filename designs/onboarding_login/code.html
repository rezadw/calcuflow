<body class="bg-surface text-on-surface font-body-md min-h-screen flex items-center justify-center">
<!-- Main Container -->
<main class="w-full max-w-max-width mx-auto flex min-h-screen lg:min-h-0 lg:h-[870px] lg:rounded-2xl lg:overflow-hidden lg:custom-shadow bg-surface-container-lowest">
<!-- Left Side: Login & Onboarding Forms -->
<section class="w-full lg:w-1/2 p-margin-mobile md:p-margin-desktop overflow-y-auto custom-scrollbar flex flex-col items-center justify-center">
<div class="w-full max-w-md">
<!-- Header -->
<div class="text-center mb-lg">
<h1 class="font-display-lg text-display-lg text-primary mb-xs">CalcuMap</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Precision Learning Starts Here</p>
</div>
<!-- Tabs (Visual Only for context) -->
<div class="flex border-b border-surface-variant mb-md">
<button aria-selected="true" class="flex-1 pb-sm font-label-md text-label-md text-primary border-b-2 border-primary">Sign In</button>
<button aria-selected="false" class="flex-1 pb-sm font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors">New Profile</button>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest p-md rounded-2xl flat-border mb-lg">
<form class="space-y-sm">
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="email">Email or NIM</label>
<input class="w-full h-[48px] rounded-xl border border-[#26215C]/15 bg-surface-container-lowest px-sm focus:border-2 focus:border-primary focus:outline-none focus:ring-0 transition-all font-body-md text-body-md text-on-surface placeholder:text-outline" id="email" placeholder="student@campus.edu" type="text">
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="password">Password</label>
<input class="w-full h-[48px] rounded-xl border border-[#26215C]/15 bg-surface-container-lowest px-sm focus:border-2 focus:border-primary focus:outline-none focus:ring-0 transition-all font-body-md text-body-md text-on-surface placeholder:text-outline" id="password" placeholder="••••••••" type="password">
</div>
<div class="flex justify-end mt-xs mb-md">
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot password?</a>
</div>
<button class="w-full h-[48px] bg-primary text-on-primary font-label-md text-label-md rounded-xl hover:opacity-90 transition-opacity" type="button">Sign In</button>
</form>
<div class="mt-md relative flex items-center justify-center">
<div class="absolute inset-x-0 h-px bg-surface-variant"></div>
<span class="relative bg-surface-container-lowest px-sm font-label-sm text-label-sm text-on-surface-variant">OR</span>
</div>
<div class="mt-md">
<button class="w-full h-[48px] bg-surface-container-lowest border border-primary text-primary font-label-md text-label-md rounded-xl hover:bg-surface-variant/20 transition-colors flex items-center justify-center gap-xs" type="button">
<span class="material-symbols-outlined text-[20px]">school</span>
                            SSO Campus Login
                        </button>
</div>
</div>
<!-- Onboarding Profile Form (Hidden by default, shown for demonstration based on prompt) -->
<div class="bg-surface-container-lowest p-md rounded-2xl flat-border opacity-70">
<h2 class="font-headline-md text-headline-md text-on-surface mb-sm">First Time Setup</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-md">Complete your profile to customize your learning map.</p>
<form class="space-y-sm">
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="name">Full Name</label>
<input class="w-full h-[48px] rounded-xl border border-[#26215C]/15 bg-surface-container-lowest px-sm focus:border-2 focus:border-primary focus:outline-none focus:ring-0 transition-all font-body-md text-body-md text-on-surface" id="name" placeholder="Jane Doe" type="text">
</div>
<div class="grid grid-cols-2 gap-sm">
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="major">Major/Program</label>
<input class="w-full h-[48px] rounded-xl border border-[#26215C]/15 bg-surface-container-lowest px-sm focus:border-2 focus:border-primary focus:outline-none focus:ring-0 transition-all font-body-md text-body-md text-on-surface" id="major" placeholder="Engineering" type="text">
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="semester">Semester</label>
<input class="w-full h-[48px] rounded-xl border border-[#26215C]/15 bg-surface-container-lowest px-sm focus:border-2 focus:border-primary focus:outline-none focus:ring-0 transition-all font-body-md text-body-md text-on-surface" id="semester" placeholder="3" type="number">
</div>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="course">Current Calculus Course</label>
<div class="relative">
<select class="w-full h-[48px] rounded-xl border border-[#26215C]/15 bg-surface-container-lowest px-sm appearance-none focus:border-2 focus:border-primary focus:outline-none focus:ring-0 transition-all font-body-md text-body-md text-on-surface" id="course">
<option disabled="" selected="" value="">Select a course...</option>
<option value="calc1">Calculus I</option>
<option value="calc2">Calculus II</option>
<option value="calc3">Calculus III</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<button class="w-full h-[48px] mt-md bg-secondary text-on-secondary font-label-md text-label-md rounded-xl hover:opacity-90 transition-opacity opacity-50 cursor-not-allowed" type="button">Complete Profile</button>
</form>
</div>
</div>
</section>
<!-- Right Side: Illustration Area -->
<section class="hidden lg:flex w-1/2 bg-surface-container-low items-center justify-center p-margin-desktop relative overflow-hidden">
<!-- Decorative Elements mapping to Soft Precision aesthetic -->
<div class="absolute inset-0 flex items-center justify-center opacity-80 mix-blend-multiply">
<div class="bg-cover bg-center w-full h-full" data-alt="Abstract minimalist geometric composition featuring smooth, rounded 3D shapes representing mathematical concepts. A large, soft indigo sphere intersects with a precise, mint-green cylinder against a pristine, off-white background. The lighting is soft and studio-quality, casting gentle, diffused shadows that emphasize depth without harsh contrast. The overall aesthetic is clean, academic, encouraging, and highly modern, perfectly suited for an educational platform interface." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD-ffgjXS-di1PC7rn5ehqu-8rfz_rOC_30U0hflsQVXqC_FGdgGjWV96FbJdVz7l0u9EHQpdfKi4BQD40WET5i5VLZpvG2rVZBcfTW2blEBeL-c4Bxr6VIlT1-LhCNT9v2tc6r_BrtfNAZjAWL9Yc3-Ee9u3g_k57Y1Udq2Gf-T7thooczlC0qHelY2Js2_E30XZriT53Tpk18SeoEN5wsD7q_iPT12Uo-NH4k24OGyCjT4XeguMR8x1wAjLmYHVqi2fYO4M2SxVq1')"></div>
</div>
<!-- Optional overlay for text or branding if needed, keeping it minimal -->
<div class="absolute bottom-margin-desktop left-margin-desktop right-margin-desktop z-10 bg-surface-container-lowest/80 backdrop-blur-md p-md rounded-2xl flat-border custom-shadow">
<h3 class="font-headline-md text-headline-md text-primary mb-xs flex items-center gap-xs">
<span class="material-symbols-outlined text-[24px]">explore</span>
                    Visualize Your Progress
                </h3>
<p class="font-body-md text-body-md text-on-surface-variant">Navigate complex concepts with structured, step-by-step visual learning maps tailored to your syllabus.</p>
</div>
</section>
</main>
</body></html>
